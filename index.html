<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Copa 2026">
<meta name="theme-color" content="#080808">
<title>Álbum Copa 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --black:#080808;--black2:#111111;--black3:#1a1a1a;--black4:#242424;--black5:#2e2e2e;
  --gold:#C9A84C;--gold-lt:#F0D080;--gold-dk:#7A5E20;
  --red:#C0272D;--red-lt:#FF6B6B;--green:#2E7D32;--green-lt:#66BB6A;
  --blue:#0D47A1;--blue-lt:#64B5F6;--white:#F5F5F0;--grey:#888880;--grey-dk:#444440;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--black);color:var(--white);font-family:'DM Sans',-apple-system,sans-serif;overflow-y:auto;-webkit-overflow-scrolling:touch;}


/* HEADER */
#header{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--black);border-bottom:1px solid var(--gold-dk);padding:14px 16px 0;padding-top:max(14px,env(safe-area-inset-top));box-shadow:0 1px 0 var(--gold-dk),0 8px 32px rgba(0,0,0,.8);}
#header::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--red) 0%,var(--red) 33%,var(--green) 33%,var(--green) 66%,var(--blue) 66%,var(--blue) 100%);}
#spacer{height:0;}
#content{padding:14px 14px 80px;display:flex;flex-direction:column;gap:10px;max-width:900px;margin:0 auto;}

.h-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.logo-wrap{display:flex;align-items:center;gap:10px;}
.logo-icon{width:40px;height:56px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.logo-text{display:flex;flex-direction:column;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1.5px;color:var(--gold);line-height:1;}
.logo-sub{font-size:9px;color:var(--grey);letter-spacing:.5px;margin-top:1px;}
.btn-reset{background:transparent;border:1px solid var(--grey-dk);color:var(--grey);border-radius:6px;padding:5px 11px;font-size:11px;font-family:'DM Sans',sans-serif;cursor:pointer;}

/* BOTÃO CÂMERA FLUTUANTE */
#btnCamera{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom));right:20px;z-index:200;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--gold-dk),var(--gold));border:none;cursor:pointer;font-size:24px;box-shadow:0 4px 20px rgba(201,168,76,.5);display:flex;align-items:center;justify-content:center;transition:transform .2s;}
#btnCamera:active{transform:scale(.9);}

/* MODAL CÂMERA */
#cameraModal{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.85);display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
.cam-box{background:var(--black2);border:1px solid var(--black5);border-radius:16px;width:100%;max-width:480px;overflow:hidden;}
.cam-header{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--black5);}
.cam-title{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--gold);letter-spacing:1px;}
.cam-close{background:transparent;border:none;color:var(--grey);font-size:20px;cursor:pointer;}
.cam-modes{display:flex;gap:8px;padding:12px 16px;}
.cam-mode{flex:1;padding:8px;border-radius:8px;border:1px solid var(--black5);background:var(--black3);color:var(--grey);font-size:11px;font-weight:700;cursor:pointer;text-align:center;}
.cam-mode.active{background:var(--gold-dk);color:var(--gold-lt);border-color:var(--gold-dk);}
.cam-preview{width:100%;aspect-ratio:4/3;background:var(--black3);display:flex;align-items:center;justify-content:center;color:var(--grey-dk);font-size:13px;position:relative;overflow:hidden;}
.cam-preview img{width:100%;height:100%;object-fit:contain;}
.cam-actions{display:flex;gap:8px;padding:12px 16px;}
.cam-btn-photo{flex:1;padding:12px;border-radius:10px;background:linear-gradient(135deg,var(--gold-dk),var(--gold));color:var(--black);font-weight:700;font-size:14px;border:none;cursor:pointer;}
.cam-btn-gallery{padding:12px 14px;border-radius:10px;background:var(--black3);color:var(--grey);border:1px solid var(--black5);cursor:pointer;font-size:14px;}
.cam-result{padding:0 16px 16px;}
.cam-result-item{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:8px;margin-bottom:6px;font-size:12px;}
.cam-result-found{background:rgba(46,125,50,.2);border:1px solid rgba(46,125,50,.3);}
.cam-result-found[onclick]{transition:all .15s;}
.cam-result-found[onclick]:active{opacity:.7;}
.cam-result-deselected{background:rgba(100,100,100,.1);border:1px solid rgba(100,100,100,.2);opacity:.5;text-decoration:line-through;}
.cam-result-notfound{background:rgba(100,100,100,.15);border:1px solid rgba(100,100,100,.2);color:var(--grey);}
.cam-result-id{font-weight:700;color:var(--gold);font-family:monospace;}
.cam-result-name{flex:1;margin:0 8px;color:var(--white);}
.cam-apply{width:calc(100% - 32px);margin:0 16px 16px;padding:12px;border-radius:10px;background:var(--green);color:white;font-weight:700;font-size:14px;border:none;cursor:pointer;}
.cam-status{text-align:center;padding:12px 16px;font-size:13px;color:var(--grey);}
#camInput{display:none;}

.prog-wrap{margin-bottom:10px;}
.prog-track{background:var(--black3);border-radius:99px;height:6px;overflow:hidden;margin-bottom:5px;border:1px solid var(--black5);}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gold-dk),var(--gold),var(--gold-lt));border-radius:99px;transition:width .4s;box-shadow:0 0 8px rgba(201,168,76,.5);}
.prog-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--grey);}
.prog-n{font-weight:700;color:var(--gold);}

.pills{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.pill{font-size:10px;font-weight:700;padding:3px 10px;border-radius:99px;letter-spacing:.3px;}
.pill-g{background:rgba(46,125,50,.25);color:var(--green-lt);border:1px solid rgba(46,125,50,.4);}
.pill-r{background:rgba(192,39,45,.25);color:var(--red-lt);border:1px solid rgba(192,39,45,.4);}
.pill-b{background:rgba(13,71,161,.25);color:var(--blue-lt);border:1px solid rgba(13,71,161,.4);}

.tabs{display:flex;gap:2px;}
.tab{flex:1;padding:9px 2px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--grey);font-size:12px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:color .2s,border-color .2s;}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);}

.search-row{display:flex;flex-direction:column;gap:7px;}
.search{background:var(--black2);border:1px solid var(--black5);border-radius:10px;padding:11px 14px;color:var(--white);font-size:15px;font-family:'DM Sans',sans-serif;outline:none;width:100%;transition:border-color .2s;}
.search::placeholder{color:var(--grey-dk);}
.search:focus{border-color:var(--gold-dk);}
.filter-row{display:flex;gap:6px;}
.fbtn{flex:1;padding:8px 0;border-radius:8px;border:1px solid var(--black5);background:var(--black2);color:var(--grey);font-size:11px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .15s;}
.fbtn.active{background:var(--gold-dk);color:var(--gold-lt);border-color:var(--gold-dk);}

.group-card{background:var(--black2);border:1px solid var(--black5);border-radius:14px;overflow:hidden;}
.group-card[data-g="FWC"]{border-left:3px solid var(--gold);}
.group-card[data-g="A"]{border-left:3px solid #e53935;}
.group-card[data-g="B"]{border-left:3px solid #fb8c00;}
.group-card[data-g="C"]{border-left:3px solid #fdd835;}
.group-card[data-g="D"]{border-left:3px solid #43a047;}
.group-card[data-g="E"]{border-left:3px solid #00acc1;}
.group-card[data-g="F"]{border-left:3px solid #1e88e5;}
.group-card[data-g="G"]{border-left:3px solid #5e35b1;}
.group-card[data-g="H"]{border-left:3px solid #d81b60;}
.group-card[data-g="I"]{border-left:3px solid #6d4c41;}
.group-card[data-g="J"]{border-left:3px solid #546e7a;}
.group-card[data-g="K"]{border-left:3px solid #00897b;}
.group-card[data-g="L"]{border-left:3px solid #c0ca33;}
.group-hdr{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--black3);cursor:pointer;width:100%;border:none;text-align:left;color:var(--white);font-family:'DM Sans',sans-serif;}
.group-hdr-title{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1px;flex:1;color:var(--white);}
.group-hdr-count{background:var(--black4);color:var(--gold);border-radius:99px;padding:2px 10px;font-size:10px;font-weight:700;border:1px solid var(--gold-dk);}
.chevron{font-size:9px;color:var(--grey-dk);transition:transform .2s;display:inline-block;}
.chevron.open{transform:rotate(180deg);}

.team{border-top:1px solid var(--black4);padding:10px 13px 12px;}
.team-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.team-name{font-weight:700;font-size:13px;flex:1;min-width:100px;color:var(--white);}
.team-sfx{background:var(--black4);color:var(--grey);border-radius:4px;padding:2px 7px;font-size:9px;font-family:'DM Sans',sans-serif;font-weight:700;letter-spacing:.5px;border:1px solid var(--black5);}
.team-cnt{font-size:11px;color:var(--gold);font-weight:700;}
.btn-all{background:transparent;border:1px solid var(--black5);color:var(--grey);border-radius:6px;padding:4px 9px;font-size:10px;cursor:pointer;font-family:'DM Sans',sans-serif;}

.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(58px,1fr));gap:5px;}
.scell{display:flex;flex-direction:column;gap:3px;}
.smain{width:100%;padding:6px 3px;border-radius:8px;cursor:pointer;border:none;display:flex;flex-direction:column;align-items:center;gap:1px;transition:transform .1s,box-shadow .1s;}
.smain:active{transform:scale(.9);}
.snum{font-size:12px;font-weight:700;font-family:'DM Sans',sans-serif;line-height:1.2;}
.sname{font-size:8px;font-weight:500;text-align:center;line-height:1.2;opacity:.85;max-width:54px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.smiss .smain{background:var(--black3);color:var(--grey-dk);border:1px dashed var(--black5);}
.smiss .smain:hover{border-color:var(--grey-dk);color:var(--grey);}
.shave .smain{background:linear-gradient(135deg,var(--gold-dk),#8B6914);color:var(--gold-lt);border:1px solid var(--gold-dk);box-shadow:0 0 8px rgba(201,168,76,.2);}

.sextra{display:flex;align-items:center;justify-content:space-between;background:rgba(201,168,76,.08);border-radius:6px;padding:2px 4px;border:1px solid rgba(201,168,76,.15);}
.xbtn{background:transparent;border:none;color:var(--gold);font-size:17px;font-weight:700;padding:0 4px;cursor:pointer;line-height:1;}
.xcnt{font-size:10px;font-weight:700;color:var(--gold-lt);min-width:20px;text-align:center;}

.export-bar{display:flex;align-items:center;justify-content:space-between;background:var(--black2);border:1px solid var(--black5);border-radius:12px;padding:12px 14px;}
.export-info{font-size:13px;color:var(--grey);}
.export-info strong{color:var(--white);}
.btn-export{background:linear-gradient(135deg,var(--gold-dk),var(--gold));color:var(--black);border:none;border-radius:8px;padding:8px 16px;font-size:12px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;box-shadow:0 2px 12px rgba(201,168,76,.3);}
.export-msg{background:rgba(46,125,50,.2);color:var(--green-lt);border:1px solid rgba(46,125,50,.3);border-radius:8px;padding:9px 14px;font-size:13px;text-align:center;display:none;margin-top:6px;}
.extras-tip{background:var(--black2);border:1px solid var(--black5);border-radius:10px;padding:11px 14px;font-size:12px;color:var(--grey);line-height:1.6;}

.list-card{background:var(--black2);border:1px solid var(--black5);border-radius:12px;overflow:hidden;}
.list-hdr{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;font-size:13px;font-weight:700;background:var(--black3);}
.list-sfx{font-size:10px;color:var(--grey);font-weight:400;}
.lbadge{border-radius:99px;padding:2px 10px;font-size:10px;font-weight:700;}
.lbadge-r{background:rgba(192,39,45,.2);color:var(--red-lt);border:1px solid rgba(192,39,45,.3);}
.lbadge-b{background:rgba(13,71,161,.2);color:var(--blue-lt);border:1px solid rgba(13,71,161,.3);}
.tag-list{display:flex;flex-wrap:wrap;gap:5px;padding:10px 12px;}
.tag{border-radius:6px;padding:3px 8px;font-size:11px;font-weight:700;font-family:'DM Sans',sans-serif;}
.tag-r{background:rgba(192,39,45,.15);color:var(--red-lt);border:1px solid rgba(192,39,45,.2);}
.tag-b{background:rgba(13,71,161,.15);color:var(--blue-lt);border:1px solid rgba(13,71,161,.2);}
.empty{text-align:center;color:var(--grey-dk);padding:50px 20px;font-size:14px;}

#footer{text-align:center;padding:24px 0 8px;font-size:10px;color:var(--grey-dk);letter-spacing:.5px;}
#footer span{color:var(--gold-dk);font-weight:700;}
#footer .famiglia{color:var(--grey-dk);font-style:italic;display:block;margin-top:3px;letter-spacing:1px;}
</style>
</head>
<body>

<div id="header">
  <div class="h-top">
    <div class="logo-wrap">
      <div class="logo-icon">
        <img src="Logo_copa_2026.png.webp" width="44" height="56" style="object-fit:contain;display:block;">
      </div>
      <div class="logo-text">
        <div class="logo">ÁLBUM COPA 2026</div>
        <div class="logo-sub">PANINI · FIFA WORLD CUP 2026™</div>
      </div>
    </div>
    <button class="btn-reset" onclick="resetAll()">Zerar</button>
  </div>
  <div class="prog-wrap">
    <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    <div class="prog-labels"><span class="prog-n" id="progN">0/980</span><span id="progPct">0% completo</span></div>
  </div>
  <div class="pills">
    <div class="pill pill-g" id="pillHave">✅ 0 tenho</div>
    <div class="pill pill-r" id="pillMiss">❌ 980 faltam</div>
    <div class="pill pill-b" id="pillExtra">🔁 0 repetidas</div>
  </div>
  <div class="tabs">
    <button class="tab active" id="tab-album" onclick="switchTab('album')">📖 Álbum</button>
    <button class="tab" id="tab-missing" onclick="switchTab('missing')">❌ Faltam</button>
    <button class="tab" id="tab-extras" onclick="switchTab('extras')">🔁 Repetidas</button>
  </div>
</div>

<div id="spacer"></div>
<div id="content"></div>

<!-- BOTÃO CÂMERA FLUTUANTE -->
<button id="btnCamera" onclick="openCamera()">📸</button>

<!-- INPUT ARQUIVO ESCONDIDO -->
<input type="file" id="camInput" accept="image/*" capture="environment" onchange="handleCamFile(event)">

<!-- MODAL CÂMERA -->
<div id="cameraModal">
  <div class="cam-box">
    <div class="cam-header">
      <span class="cam-title">📸 RECONHECER FIGURINHAS</span>
      <button class="cam-close" onclick="closeCamera()">✕</button>
    </div>
    <div class="cam-modes">
      <button class="cam-mode active" id="mode-pack" onclick="setCamMode('pack')">📦 Pacotinho</button>
      <button class="cam-mode" id="mode-album" onclick="setCamMode('album')">📖 Página do Álbum</button>
    </div>
    <div class="cam-preview" id="camPreview">
      <span>Tire uma foto ou escolha da galeria</span>
    </div>
    <div class="cam-actions">
      <button class="cam-btn-photo" onclick="triggerCamera()">📷 Câmera</button>
      <button class="cam-btn-gallery" onclick="triggerGallery()">🖼️</button>
    </div>
    <div class="cam-status" id="camStatus"></div>
    <div class="cam-result" id="camResult"></div>
  </div>
</div>

const N=20,KEY="copa2026_v5";
let state={},openGroups={},currentTab="album",filterMode="all",searchQ="",exportTimer=null;

function buildInitial(){const s={};ALBUM.forEach(({teams})=>teams.forEach(({sfx})=>{for(let i=1;i<=N;i++)s[sfx+i]={have:false,extra:0};}));return s;}
function loadState(){try{const p=JSON.parse(localStorage.getItem(KEY)||'null');if(p){const f=buildInitial();Object.keys(f).forEach(k=>{if(p[k])f[k]=p[k];});return f;}}catch(e){}return buildInitial();}
function save(){try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){}}
function stats(){const keys=Object.keys(state);const have=keys.filter(k=>state[k].have).length;return{total:keys.length,have,missing:keys.length-have,extras:keys.reduce((a,k)=>a+(state[k].extra||0),0)};}
function adjustSpacer(){const h=document.getElementById('header'),s=document.getElementById('spacer');if(h&&s)s.style.height=h.offsetHeight+'px';}
function updateHeader(){const{total,have,missing,extras}=stats();const pct=Math.round(have/total*100);document.getElementById('progFill').style.width=pct+'%';document.getElementById('progN').textContent=have+'/'+total;document.getElementById('progPct').textContent=pct+'% completo';document.getElementById('pillHave').textContent='✅ '+have+' tenho';document.getElementById('pillMiss').textContent='❌ '+missing+' faltam';document.getElementById('pillExtra').textContent='🔁 '+extras+' repetidas';adjustSpacer();}
function render(){updateHeader();const ct=document.getElementById('content');if(currentTab==='album')ct.innerHTML=buildAlbum();else if(currentTab==='missing')ct.innerHTML=buildMissing();else ct.innerHTML=buildExtras();}

function buildAlbum(){
  let h=`<div class="search-row"><input class="search" placeholder="🔍 Buscar jogador, seleção ou número…" value="${searchQ.replace(/"/g,'')}" oninput="searchQ=this.value.toUpperCase();render()" autocapitalize="characters" autocorrect="off" autocomplete="off"><div class="filter-row"><button class="fbtn ${filterMode==='all'?'active':''}" onclick="filterMode='all';render()">Todas</button><button class="fbtn ${filterMode==='have'?'active':''}" onclick="filterMode='have';render()">✅ Tenho</button><button class="fbtn ${filterMode==='missing'?'active':''}" onclick="filterMode='missing';render()">❌ Faltam</button></div></div>`;
  ALBUM.forEach(({g,gl,teams})=>{
    const isOpen=!!openGroups[g];
    const gHave=teams.reduce((a,{sfx})=>{for(let i=1;i<=N;i++)if(state[sfx+i]?.have)a++;return a;},0);
    const gTotal=teams.length*N;
    h+=`<div class="group-card" data-g="${g}"><button class="group-hdr" onclick="openGroups['${g}']=!openGroups['${g}'];render()"><span class="group-hdr-title">${gl}</span><span class="group-hdr-count">${gHave}/${gTotal}</span><span class="chevron ${isOpen?'open':''}">▼</span></button>`;
    if(isOpen){
      teams.forEach((t)=>{
        const{name,sfx,flag}=t;
        const tHave=Array.from({length:N},(_,i)=>state[sfx+(i+1)]?.have).filter(Boolean).length;
        const allHave=tHave===N;
        const visible=[];
        for(let i=1;i<=N;i++){
          const id=sfx+i,s=state[id]||{have:false,extra:0};
          const pName=(t.p&&t.p[i-1])?t.p[i-1]:'';
          const fOk=filterMode==='all'||(filterMode==='have'&&s.have)||(filterMode==='missing'&&!s.have);
          const sOk=!searchQ||String(i).includes(searchQ)||name.toUpperCase().includes(searchQ)||sfx.includes(searchQ)||pName.toUpperCase().includes(searchQ);
          if(fOk&&sOk)visible.push({id,num:i,have:s.have,extra:s.extra,pName});
        }
        if(!visible.length)return;
        h+=`<div class="team"><div class="team-hdr"><span class="team-name">${flag} ${name}</span><span class="team-sfx">${sfx}</span><span class="team-cnt">${tHave}/${N}</span><button class="btn-all" onclick="markAll('${sfx}',${!allHave})">${allHave?'Desmarcar':'Marcar tudo'}</button></div><div class="sgrid">`;
        visible.forEach(({id,num,have,extra,pName})=>{
          const shortName=pName.length>12?pName.split(' ').pop():pName;
          h+=`<div class="scell ${have?'shave':'smiss'}" title="${pName}"><button class="smain" onclick="tog('${id}')"><span class="snum">${num}${have?' ✓':''}</span><span class="sname">${shortName}</span></button>${have?`<div class="sextra"><button class="xbtn" onclick="xtra('${id}',-1)">−</button><span class="xcnt">${extra>0?'+'+extra:'—'}</span><button class="xbtn" onclick="xtra('${id}',1)">+</button></div>`:''}</div>`;
        });
        h+=`</div></div>`;
      });
    }
    h+=`</div>`;
  });
  h+=`<div id="footer">Powered by <span>João Tamiosso</span> · Copa 2026<span class="famiglia">Famiglia Tamiosso</span></div>`;
  return h;
}

function buildMissing(){
  const{missing}=stats();
  let h=`<div class="export-bar"><div class="export-info"><strong>${missing}</strong> figurinhas faltando</div><button class="btn-export" onclick="exportList('missing')">📋 Copiar lista</button></div><div class="export-msg" id="exportMsg"></div>`;
  let any=false;
  ALBUM.forEach(({teams})=>teams.forEach((t)=>{
    const{name,sfx,flag}=t;
    const items=[];
    for(let i=1;i<=N;i++)if(!state[sfx+i]?.have)items.push({n:i,pName:(t.p&&t.p[i-1])?t.p[i-1]:''});
    if(!items.length)return;any=true;
    h+=`<div class="list-card"><div class="list-hdr"><div>${flag} ${name} <span class="list-sfx">${sfx}</span></div><span class="lbadge lbadge-r">${items.length} faltam</span></div><div class="tag-list">${items.map(({n,pName})=>`<span class="tag tag-r" title="${pName}">${n}</span>`).join('')}</div></div>`;
  }));
  if(!any)h+=`<div class="empty">🏆 Álbum completo! Parabéns!</div>`;
  h+=`<div id="footer">Powered by <span>João Tamiosso</span> · Copa 2026<span class="famiglia">Famiglia Tamiosso</span></div>`;
  return h;
}

function buildExtras(){
  const{extras}=stats();
  let h=`<div class="export-bar"><div class="export-info"><strong>${extras}</strong> figurinhas repetidas</div><button class="btn-export" onclick="exportList('extras')">📋 Copiar lista</button></div><div class="export-msg" id="exportMsg"></div><div class="extras-tip">💡 Marque repetidas na aba <strong>Álbum</strong> com os botões <strong>+/−</strong>.</div>`;
  let any=false;
  ALBUM.forEach(({teams})=>teams.forEach((t)=>{
    const{name,sfx,flag}=t;
    const items=[];
    for(let i=1;i<=N;i++){const e=state[sfx+i]?.extra||0;if(e>0)items.push({n:i,e,pName:(t.p&&t.p[i-1])?t.p[i-1]:''});}
    if(!items.length)return;any=true;
    const tot=items.reduce((a,x)=>a+x.e,0);
    h+=`<div class="list-card"><div class="list-hdr"><div>${flag} ${name} <span class="list-sfx">${sfx}</span></div><span class="lbadge lbadge-b">${tot} repetidas</span></div><div class="tag-list">${items.map(({n,e,pName})=>`<span class="tag tag-b" title="${pName}">${n} ×${e}</span>`).join('')}</div></div>`;
  }));
  if(!any)h+=`<div class="empty">Nenhuma repetida ainda.</div>`;
  h+=`<div id="footer">Powered by <span>João Tamiosso</span> · Copa 2026<span class="famiglia">Famiglia Tamiosso</span></div>`;
  return h;
}

function tog(id){const s=state[id];state[id]={have:!s.have,extra:s.have?0:s.extra};save();render();}
function xtra(id,d){const s=state[id];const n=Math.max(0,(s.extra||0)+d);state[id]={have:n>0||s.have,extra:n};save();render();}

function resetAll(){if(confirm('Zerar tudo? Não pode ser desfeito.')){state=buildInitial();save();render();}}

function exportList(type){
  const lines=[];
  ALBUM.forEach(({teams})=>teams.forEach((t)=>{
    const{name,sfx,flag}=t;
    const items=[];
    for(let i=1;i<=N;i++){
      const s=state[sfx+i];
      const pName=(t.p&&t.p[i-1])?t.p[i-1]:'';
      if(type==='missing'&&!s.have)items.push(pName||String(i));
      if(type==='extras'&&s.extra>0)items.push((pName||String(i))+'×'+s.extra);
    }
    if(items.length)lines.push(flag+' '+name+' ('+sfx+'): '+items.join(', '));
  }));
  const title=type==='missing'?'❌ FIGURINHAS QUE FALTAM':'🔁 FIGURINHAS REPETIDAS';
  const text=title+'\nÁlbum Panini Copa 2026\n\n'+lines.join('\n')+'\n\n— Powered by João Tamiosso | Famiglia Tamiosso';
  const show=msg=>{const el=document.getElementById('exportMsg');if(!el)return;el.textContent=msg;el.style.display='block';clearTimeout(exportTimer);exportTimer=setTimeout(()=>{el.style.display='none';},3000);};
  if(!lines.length){show(type==='missing'?'🏆 Nenhuma faltando!':'Nenhuma repetida.');return;}
  if(navigator.clipboard){navigator.clipboard.writeText(text).then(()=>show('✅ Copiado!')).catch(()=>show('✅ Copiado!'));}
  else{const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;top:0;left:-9999px';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');}catch(e){}document.body.removeChild(ta);show('✅ Copiado!');}
}

// ── COMPRESSÃO DE IMAGEM ─────────────────────────────────────────────────
function compressImage(dataUrl, maxSize, quality) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      let w = img.width, h = img.height;
      if (w > maxSize || h > maxSize) {
        if (w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
        else { w = Math.round(w * maxSize / h); h = maxSize; }
      }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.src = dataUrl;
  });
}

// ── SISTEMA DE CÂMERA ─────────────────────────────────────────────────────
const API_URL = 'https://album-copa-two.vercel.app/api/analyze'; // Vercel serverless function
let camMode = 'pack';
let pendingStickers = [];

function openCamera() {
  document.getElementById('cameraModal').style.display = 'flex';
  document.getElementById('camResult').innerHTML = '';
  document.getElementById('camStatus').textContent = '';
  document.getElementById('camPreview').innerHTML = '<span>Tire uma foto ou escolha da galeria</span>';
  pendingStickers = [];
}

function closeCamera() {
  document.getElementById('cameraModal').style.display = 'none';
}

function setCamMode(mode) {
  camMode = mode;
  document.getElementById('mode-pack').classList.toggle('active', mode === 'pack');
  document.getElementById('mode-album').classList.toggle('active', mode === 'album');
}

function triggerCamera() {
  const input = document.getElementById('camInput');
  input.setAttribute('capture', 'environment');
  input.click();
}

function triggerGallery() {
  const input = document.getElementById('camInput');
  input.removeAttribute('capture');
  input.click();
}

async function handleCamFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  event.target.value = '';

  // Comprimir imagem antes de enviar
  const reader = new FileReader();
  reader.onload = async (e) => {
    // Comprime para max 1200px e qualidade 0.7
    const compressed = await compressImage(e.target.result, 1200, 0.7);
    const base64 = compressed.split(',')[1];
    const mediaType = 'image/jpeg';

    document.getElementById('camPreview').innerHTML = `<img src="${compressed}" alt="preview">`;
    document.getElementById('camStatus').textContent = '🔍 Analisando figurinhas...';
    document.getElementById('camResult').innerHTML = '';
    pendingStickers = [];

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ image: base64, mediaType, mode: camMode }),
      });

      if (!res.ok) throw new Error('Erro na API: ' + res.status);
      const data = await res.json();

      if (data.found.length === 0 && data.notFound.length === 0) {
        document.getElementById('camStatus').textContent = '😕 Nenhuma figurinha identificada. Tente com melhor iluminação.';
        return;
      }

      // Filtrar já marcadas
      const novas = data.found.filter(f => !state[f.id]?.have);
      const jatem = data.found.filter(f => state[f.id]?.have);
      pendingStickers = novas;

      document.getElementById('camStatus').textContent =
        `✅ ${data.found.length} identificadas • ${novas.length} novas • ${jatem.length} já tens`;

      renderCamResults(jatem, data.notFound);

    } catch (err) {
      document.getElementById('camStatus').textContent = '❌ Erro: ' + err.message;
    }
  };
  reader.readAsDataURL(file);
}

function renderCamResults(jatem, notFound) {
  let html = '';

  if (pendingStickers.length > 0) {
    html += '<div style="font-size:11px;color:var(--gold);font-weight:700;margin-bottom:6px;">NOVAS — toque para (des)selecionar:</div>';
    pendingStickers.forEach((f, i) => {
      const desmarcada = f.selected === false;
      html += `<div class="cam-result-item ${desmarcada ? 'cam-result-deselected' : 'cam-result-found'}" onclick="togglePending(${i})" style="cursor:pointer">
        <span class="cam-result-id">${f.id}</span>
        <span class="cam-result-name">${f.player}</span>
        <span>${desmarcada ? '✕' : '✓'}</span>
      </div>`;
    });
  }

  if (jatem && jatem.length > 0) {
    html += '<div style="font-size:11px;color:var(--grey);font-weight:700;margin:8px 0 6px;">JÁ TENS:</div>';
    jatem.forEach(f => {
      html += `<div class="cam-result-item cam-result-notfound">
        <span class="cam-result-id">${f.id}</span>
        <span class="cam-result-name">${f.player}</span>
        <span>📌</span>
      </div>`;
    });
  }

  if (notFound && notFound.length > 0) {
    html += `<div style="font-size:10px;color:var(--grey-dk);margin-top:8px;">Não identificados: ${notFound.join(', ')}</div>`;
  }

  const selecionadas = pendingStickers.filter(f => f.selected !== false).length;
  if (selecionadas > 0) {
    html += `<button class="cam-apply" onclick="applyStickers()">✅ Marcar ${selecionadas} figurinha${selecionadas > 1 ? 's' : ''} como TENHO</button>`;
  }

  document.getElementById('camResult').innerHTML = html;
}

function togglePending(index) {
  if (pendingStickers[index].selected === false) {
    pendingStickers[index].selected = true;
  } else {
    pendingStickers[index].selected = false;
  }
  // Re-renderizar sem perder o estado
  const jatem = []; // já não temos referência, mas não precisamos reexibir
  renderCamResults(null, null);
}

function applyStickers() {
  const selecionadas = pendingStickers.filter(f => f.selected !== false);
  if (!selecionadas.length) return;
  selecionadas.forEach(f => {
    state[f.id] = { have: true, extra: state[f.id]?.extra || 0 };
  });
  save();
  render();
  closeCamera();
  const msg = `✅ ${selecionadas.length} figurinha${selecionadas.length > 1 ? 's marcadas' : ' marcada'}!`;
  setTimeout(() => alert(msg), 100);
  pendingStickers = [];
}
