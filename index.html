<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Copa 2026">
<meta name="theme-color" content="#0c1220">
<title>Álbum Copa 2026</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: #0c1220;
  color: #e2e8f0;
  font-family: -apple-system, 'Helvetica Neue', sans-serif;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

/* HEADER FIXO */
#header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  background: linear-gradient(160deg, #0f2a4a 0%, #0c1220 100%);
  border-bottom: 2px solid #22c55e;
  box-shadow: 0 4px 20px rgba(0,0,0,.6);
  padding: 12px 14px 0;
  padding-top: max(12px, env(safe-area-inset-top));
}

/* CONTEÚDO */
#spacer { height: 0; }
#content { padding: 12px 14px 60px; display: flex; flex-direction: column; gap: 10px; max-width: 900px; margin: 0 auto; }

/* HEADER INTERNOS */
.h-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.logo { font-size: 19px; font-weight: 800; color: #22c55e; letter-spacing: -.5px; }
.logo-sub { font-size: 10px; color: #64748b; margin-top: 1px; }
.btn-reset { background: transparent; border: 1px solid #334155; color: #64748b; border-radius: 8px; padding: 5px 10px; font-size: 11px; cursor: pointer; }

.prog-bar { background: #1e293b; border-radius: 99px; height: 7px; overflow: hidden; margin-bottom: 4px; }
.prog-fill { height: 100%; background: linear-gradient(90deg,#15803d,#22c55e); border-radius: 99px; transition: width .3s; }
.prog-labels { display: flex; justify-content: space-between; font-size: 11px; color: #64748b; margin-bottom: 8px; }
.prog-n { font-weight: 700; color: #22c55e; }

.pills { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
.pill { font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 99px; }
.pill-g { background: #14532d; color: #86efac; }
.pill-r { background: #450a0a; color: #fca5a5; }
.pill-b { background: #1e3a5f; color: #93c5fd; }

.tabs { display: flex; }
.tab { flex: 1; padding: 9px 2px; background: transparent; border: none; border-bottom: 2px solid transparent; color: #64748b; font-size: 12px; font-weight: 700; cursor: pointer; }
.tab.active { color: #22c55e; border-bottom-color: #22c55e; }

/* BUSCA */
.search-row { display: flex; flex-direction: column; gap: 7px; }
.search { background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 10px 13px; color: #e2e8f0; font-size: 16px; outline: none; width: 100%; }
.search:focus { border-color: #22c55e; }
.filter-row { display: flex; gap: 6px; }
.fbtn { flex: 1; padding: 8px 0; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: #64748b; font-size: 11px; font-weight: 700; cursor: pointer; }
.fbtn.active { background: #22c55e; color: #0c1220; border-color: #22c55e; }

/* GRUPOS */
.group-card { background: #131f2e; border: 1px solid #1e3a5f; border-radius: 12px; overflow: hidden; }
.group-hdr { display: flex; align-items: center; gap: 8px; padding: 12px 13px; background: #0f1d30; cursor: pointer; width: 100%; border: none; text-align: left; color: #e2e8f0; font-size: 13px; }
.group-hdr-title { font-weight: 800; flex: 1; color: #93c5fd; }
.group-hdr-count { background: #1e3a5f; color: #60a5fa; border-radius: 99px; padding: 2px 9px; font-size: 10px; font-weight: 700; }
.chevron { font-size: 10px; color: #475569; transition: transform .2s; display: inline-block; }
.chevron.open { transform: rotate(180deg); }

/* TIMES */
.team { border-top: 1px solid #1a2740; padding: 10px 12px 12px; }
.team-hdr { display: flex; align-items: center; gap: 7px; margin-bottom: 10px; flex-wrap: wrap; }
.team-name { font-weight: 700; font-size: 13px; flex: 1; min-width: 100px; }
.team-sfx { background: #1e293b; color: #94a3b8; border-radius: 4px; padding: 2px 6px; font-size: 9px; font-family: monospace; font-weight: 700; }
.team-cnt { font-size: 11px; color: #22c55e; font-weight: 700; }
.btn-all { background: transparent; border: 1px solid #334155; color: #94a3b8; border-radius: 6px; padding: 4px 8px; font-size: 10px; cursor: pointer; }

/* FIGURINHAS */
.sgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(60px,1fr)); gap: 5px; }
.scell { display: flex; flex-direction: column; gap: 3px; }
.smain { width: 100%; padding: 8px 3px; border-radius: 8px; cursor: pointer; border: none; display: flex; flex-direction: column; align-items: center; gap: 2px; }
.smain:active { opacity: .7; }
.sid { font-size: 10px; font-weight: 700; font-family: monospace; text-align: center; }
.scheck { font-size: 9px; }
.shave .smain { background: #14532d; color: #86efac; }
.smiss .smain { background: #1e293b; color: #475569; border: 1px dashed #334155; }
.sextra { display: flex; align-items: center; justify-content: space-between; background: #0f2a1d; border-radius: 6px; padding: 2px 4px; }
.xbtn { background: transparent; border: none; color: #22c55e; font-size: 18px; font-weight: 700; padding: 0 4px; cursor: pointer; line-height: 1; }
.xcnt { font-size: 10px; font-weight: 700; color: #4ade80; min-width: 22px; text-align: center; }

/* EXPORT */
.export-bar { display: flex; align-items: center; justify-content: space-between; background: #0f1d30; border: 1px solid #1e3a5f; border-radius: 10px; padding: 10px 13px; }
.export-info { font-size: 13px; color: #94a3b8; }
.export-info strong { color: #e2e8f0; }
.btn-export { background: #1d4ed8; color: #fff; border: none; border-radius: 8px; padding: 8px 14px; font-size: 12px; font-weight: 700; cursor: pointer; }
.export-msg { background: #14532d; color: #86efac; border-radius: 8px; padding: 9px 14px; font-size: 13px; text-align: center; display: none; }
.extras-tip { background: #1e293b; border-radius: 8px; padding: 10px 13px; font-size: 12px; color: #94a3b8; line-height: 1.5; }

/* LISTAS */
.list-card { background: #131f2e; border: 1px solid #1e3a5f; border-radius: 10px; overflow: hidden; }
.list-hdr { display: flex; justify-content: space-between; align-items: center; padding: 10px 13px; font-size: 13px; font-weight: 700; background: #0f1d30; }
.lbadge { border-radius: 99px; padding: 2px 9px; font-size: 10px; font-weight: 700; }
.lbadge-r { background: #450a0a; color: #fca5a5; }
.lbadge-b { background: #1e3a5f; color: #93c5fd; }
.tag-list { display: flex; flex-wrap: wrap; gap: 5px; padding: 9px 11px; }
.tag { border-radius: 6px; padding: 3px 7px; font-size: 10px; font-weight: 700; font-family: monospace; }
.tag-r { background: #450a0a; color: #fca5a5; }
.tag-b { background: #1e3a5f; color: #93c5fd; }
.empty { text-align: center; color: #64748b; padding: 40px; font-size: 14px; }
</style>
</head>
<body>

<div id="header">
  <div class="h-top">
    <div>
      <div class="logo">⚽ Álbum Copa 2026</div>
      <div class="logo-sub">Panini FIFA World Cup 2026™</div>
    </div>
    <button class="btn-reset" onclick="resetAll()">Zerar</button>
  </div>
  <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
  <div class="prog-labels"><span class="prog-n" id="progN">0/980</span><span id="progPct">0% completo</span></div>
  <div class="pills">
    <div class="pill pill-g" id="pillHave">✅ 0 tenho</div>
    <div class="pill pill-r" id="pillMiss">❌ 980 faltam</div>
    <div class="pill pill-b" id="pillExtra">🔁 0 repetidas</div>
  </div>
  <div class="tabs">
    <button class="tab active" id="tab-album" onclick="switchTab('album')">📖 Álbum</button>
    <button class="tab" id="tab-missing" onclick="switchTab('missing')">❌ Faltam</button>
    <button class="tab" id="tab-extras" onclick="switchTab('extras')">🔁 Repetidas</button>
  </div>
</div>

<div id="spacer"></div>
<div id="content"></div>

<script>
const ALBUM = [
  { g:"FWC", gl:"Abertura", teams:[{ name:"FIFA World Cup 2026™", sfx:"FWC", flag:"🏆" }]},
  { g:"A", gl:"Grupo A", teams:[
    { name:"México",             sfx:"MEX", flag:"🇲🇽" },
    { name:"África do Sul",      sfx:"RSA", flag:"🇿🇦" },
    { name:"Coreia do Sul",      sfx:"KOR", flag:"🇰🇷" },
    { name:"República Tcheca",   sfx:"CZE", flag:"🇨🇿" },
  ]},
  { g:"B", gl:"Grupo B", teams:[
    { name:"Canadá",               sfx:"CAN", flag:"🇨🇦" },
    { name:"Bósnia e Herzegovina", sfx:"BIH", flag:"🇧🇦" },
    { name:"Catar",                sfx:"QAT", flag:"🇶🇦" },
    { name:"Suíça",                sfx:"SUI", flag:"🇨🇭" },
  ]},
  { g:"C", gl:"Grupo C", teams:[
    { name:"Brasil",   sfx:"BRA", flag:"🇧🇷" },
    { name:"Marrocos", sfx:"MAR", flag:"🇲🇦" },
    { name:"Haiti",    sfx:"HAI", flag:"🇭🇹" },
    { name:"Escócia",  sfx:"SCO", flag:"🏴󠁧󠁢󠁳󠁣󠁴󠁿" },
  ]},
  { g:"D", gl:"Grupo D", teams:[
    { name:"Estados Unidos", sfx:"USA", flag:"🇺🇸" },
    { name:"Paraguai",       sfx:"PAR", flag:"🇵🇾" },
    { name:"Austrália",      sfx:"AUS", flag:"🇦🇺" },
    { name:"Turquia",        sfx:"TUR", flag:"🇹🇷" },
  ]},
  { g:"E", gl:"Grupo E", teams:[
    { name:"Alemanha",        sfx:"GER", flag:"🇩🇪" },
    { name:"Curaçao",         sfx:"CUW", flag:"🇨🇼" },
    { name:"Costa do Marfim", sfx:"CIV", flag:"🇨🇮" },
    { name:"Equador",         sfx:"ECU", flag:"🇪🇨" },
  ]},
  { g:"F", gl:"Grupo F", teams:[
    { name:"Holanda", sfx:"NED", flag:"🇳🇱" },
    { name:"Japão",   sfx:"JPN", flag:"🇯🇵" },
    { name:"Suécia",  sfx:"SWE", flag:"🇸🇪" },
    { name:"Tunísia", sfx:"TUN", flag:"🇹🇳" },
  ]},
  { g:"G", gl:"Grupo G", teams:[
    { name:"Bélgica",       sfx:"BEL", flag:"🇧🇪" },
    { name:"Egito",         sfx:"EGY", flag:"🇪🇬" },
    { name:"Irã",           sfx:"IRN", flag:"🇮🇷" },
    { name:"Nova Zelândia", sfx:"NZL", flag:"🇳🇿" },
  ]},
  { g:"H", gl:"Grupo H", teams:[
    { name:"Espanha",        sfx:"ESP", flag:"🇪🇸" },
    { name:"Cabo Verde",     sfx:"CPV", flag:"🇨🇻" },
    { name:"Arábia Saudita", sfx:"KSA", flag:"🇸🇦" },
    { name:"Uruguai",        sfx:"URU", flag:"🇺🇾" },
  ]},
  { g:"I", gl:"Grupo I", teams:[
    { name:"França",  sfx:"FRA", flag:"🇫🇷" },
    { name:"Senegal", sfx:"SEN", flag:"🇸🇳" },
    { name:"Iraque",  sfx:"IRQ", flag:"🇮🇶" },
    { name:"Noruega", sfx:"NOR", flag:"🇳🇴" },
  ]},
  { g:"J", gl:"Grupo J", teams:[
    { name:"Argentina", sfx:"ARG", flag:"🇦🇷" },
    { name:"Argélia",   sfx:"ALG", flag:"🇩🇿" },
    { name:"Islândia",  sfx:"ISL", flag:"🇮🇸" },
    { name:"Nigéria",   sfx:"NGA", flag:"🇳🇬" },
  ]},
  { g:"K", gl:"Grupo K", teams:[
    { name:"Portugal",    sfx:"POR", flag:"🇵🇹" },
    { name:"Angola",      sfx:"ANG", flag:"🇦🇴" },
    { name:"Jordânia",    sfx:"JOR", flag:"🇯🇴" },
    { name:"Uzbequistão", sfx:"UZB", flag:"🇺🇿" },
  ]},
  { g:"L", gl:"Grupo L", teams:[
    { name:"Inglaterra", sfx:"ENG", flag:"🏴󠁧󠁢󠁥󠁮󠁧󠁿" },
    { name:"Colômbia",   sfx:"COL", flag:"🇨🇴" },
    { name:"Itália",     sfx:"ITA", flag:"🇮🇹" },
    { name:"Venezuela",  sfx:"VEN", flag:"🇻🇪" },
  ]},
];

const N = 20, KEY = "copa2026_v3";
let state = {}, openGroups = {}, currentTab = "album", filterMode = "all", searchQ = "", exportTimer = null;

function buildInitial() {
  const s = {};
  ALBUM.forEach(({teams}) => teams.forEach(({sfx}) => {
    for (let i=1;i<=N;i++) s[sfx+i]={have:false,extra:0};
  }));
  return s;
}

function loadState() {
  try {
    const p = JSON.parse(localStorage.getItem(KEY)||'null');
    if (p) { const f=buildInitial(); Object.keys(f).forEach(k=>{if(p[k])f[k]=p[k];}); return f; }
  } catch(e) {}
  return buildInitial();
}

function save() { try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){} }

function stats() {
  const keys=Object.keys(state);
  const have=keys.filter(k=>state[k].have).length;
  return {total:keys.length,have,missing:keys.length-have,extras:keys.reduce((a,k)=>a+(state[k].extra||0),0)};
}

function adjustSpacer() {
  const h = document.getElementById('header');
  const s = document.getElementById('spacer');
  if(h&&s) s.style.height = h.offsetHeight+'px';
}

function updateHeader() {
  const {total,have,missing,extras}=stats();
  const pct=Math.round(have/total*100);
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progN').textContent=have+'/'+total;
  document.getElementById('progPct').textContent=pct+'% completo';
  document.getElementById('pillHave').textContent='✅ '+have+' tenho';
  document.getElementById('pillMiss').textContent='❌ '+missing+' faltam';
  document.getElementById('pillExtra').textContent='🔁 '+extras+' repetidas';
  adjustSpacer();
}

function render() {
  updateHeader();
  const ct=document.getElementById('content');
  if(currentTab==='album') ct.innerHTML=buildAlbum();
  else if(currentTab==='missing') ct.innerHTML=buildMissing();
  else ct.innerHTML=buildExtras();
}

function buildAlbum() {
  let h=`<div class="search-row">
    <input class="search" placeholder="Buscar (ex: BRA5, ARG…)" value="${searchQ.replace(/"/g,'')}"
      oninput="searchQ=this.value.toUpperCase();render()" autocapitalize="characters" autocorrect="off" autocomplete="off">
    <div class="filter-row">
      <button class="fbtn ${filterMode==='all'?'active':''}" onclick="filterMode='all';render()">Todas</button>
      <button class="fbtn ${filterMode==='have'?'active':''}" onclick="filterMode='have';render()">✅ Tenho</button>
      <button class="fbtn ${filterMode==='missing'?'active':''}" onclick="filterMode='missing';render()">❌ Faltam</button>
    </div>
  </div>`;

  ALBUM.forEach(({g,gl,teams}) => {
    const isOpen=!!openGroups[g];
    const gHave=teams.reduce((a,{sfx})=>{for(let i=1;i<=N;i++)if(state[sfx+i]?.have)a++;return a;},0);
    const gTotal=teams.length*N;

    h+=`<div class="group-card">
      <button class="group-hdr" onclick="openGroups['${g}']=!openGroups['${g}'];render()">
        <span class="group-hdr-title">${gl}</span>
        <span class="group-hdr-count">${gHave}/${gTotal}</span>
        <span class="chevron ${isOpen?'open':''}">▼</span>
      </button>`;

    if(isOpen) {
      teams.forEach(({name,sfx,flag}) => {
        const tHave=Array.from({length:N},(_,i)=>state[sfx+(i+1)]?.have).filter(Boolean).length;
        const allHave=tHave===N;
        const visible=[];
        for(let i=1;i<=N;i++){
          const id=sfx+i, s=state[id]||{have:false,extra:0};
          const fOk=filterMode==='all'||(filterMode==='have'&&s.have)||(filterMode==='missing'&&!s.have);
          const sOk=!searchQ||id.includes(searchQ)||name.toUpperCase().includes(searchQ)||sfx.includes(searchQ);
          if(fOk&&sOk)visible.push({id,have:s.have,extra:s.extra});
        }
        if(!visible.length)return;
        h+=`<div class="team">
          <div class="team-hdr">
            <span class="team-name">${flag} ${name}</span>
            <span class="team-sfx">${sfx}</span>
            <span class="team-cnt">${tHave}/${N}</span>
            <button class="btn-all" onclick="markAll('${sfx}',${!allHave})">${allHave?'Desmarcar':'Marcar tudo'}</button>
          </div>
          <div class="sgrid">`;
        visible.forEach(({id,have,extra})=>{
          h+=`<div class="scell ${have?'shave':'smiss'}">
            <button class="smain" onclick="tog('${id}')">
              <span class="sid">${id}</span>${have?'<span class="scheck">✓</span>':''}
            </button>
            ${have?`<div class="sextra">
              <button class="xbtn" onclick="xtra('${id}',-1)">−</button>
              <span class="xcnt">${extra>0?'+'+extra:'—'}</span>
              <button class="xbtn" onclick="xtra('${id}',1)">+</button>
            </div>`:''}
          </div>`;
        });
        h+=`</div></div>`;
      });
    }
    h+=`</div>`;
  });
  return h;
}

function buildMissing() {
  const {missing}=stats();
  let h=`<div class="export-bar">
    <div class="export-info"><strong>${missing}</strong> figurinhas faltando</div>
    <button class="btn-export" onclick="exportList('missing')">📋 Copiar lista</button>
  </div><div class="export-msg" id="exportMsg"></div>`;
  let any=false;
  ALBUM.forEach(({teams})=>teams.forEach(({name,sfx,flag})=>{
    const items=[];
    for(let i=1;i<=N;i++)if(!state[sfx+i]?.have)items.push(sfx+i);
    if(!items.length)return; any=true;
    h+=`<div class="list-card">
      <div class="list-hdr"><span>${flag} ${name}</span><span class="lbadge lbadge-r">${items.length} faltam</span></div>
      <div class="tag-list">${items.map(id=>`<span class="tag tag-r">${id}</span>`).join('')}</div>
    </div>`;
  }));
  if(!any)h+=`<div class="empty">🎉 Álbum completo!</div>`;
  return h;
}

function buildExtras() {
  const {extras}=stats();
  let h=`<div class="export-bar">
    <div class="export-info"><strong>${extras}</strong> figurinhas repetidas</div>
    <button class="btn-export" onclick="exportList('extras')">📋 Copiar lista</button>
  </div><div class="export-msg" id="exportMsg"></div>
  <div class="extras-tip">💡 Marque repetidas na aba <strong>Álbum</strong> com os botões <strong>+/−</strong>.</div>`;
  let any=false;
  ALBUM.forEach(({teams})=>teams.forEach(({name,sfx,flag})=>{
    const items=[];
    for(let i=1;i<=N;i++){const e=state[sfx+i]?.extra||0;if(e>0)items.push({id:sfx+i,e});}
    if(!items.length)return; any=true;
    const tot=items.reduce((a,x)=>a+x.e,0);
    h+=`<div class="list-card">
      <div class="list-hdr"><span>${flag} ${name}</span><span class="lbadge lbadge-b">${tot} repetidas</span></div>
      <div class="tag-list">${items.map(({id,e})=>`<span class="tag tag-b">${id} ×${e}</span>`).join('')}</div>
    </div>`;
  }));
  if(!any)h+=`<div class="empty">Nenhuma repetida ainda.</div>`;
  return h;
}

function tog(id){const s=state[id];state[id]={have:!s.have,extra:s.have?0:s.extra};save();render();}
function xtra(id,d){const s=state[id];const n=Math.max(0,(s.extra||0)+d);state[id]={have:n>0||s.have,extra:n};save();render();}
function markAll(sfx,have){for(let i=1;i<=N;i++)state[sfx+i]={have,extra:have?state[sfx+i].extra:0};save();render();}

function switchTab(tab){
  currentTab=tab;
  ['album','missing','extras'].forEach(t=>document.getElementById('tab-'+t).classList.toggle('active',t===tab));
  window.scrollTo(0,0);
  render();
}

function resetAll(){
  if(confirm('Zerar tudo? Não pode ser desfeito.')){state=buildInitial();save();render();}
}

function exportList(type){
  const lines=[];
  ALBUM.forEach(({teams})=>teams.forEach(({name,sfx})=>{
    const items=[];
    for(let i=1;i<=N;i++){const id=sfx+i,s=state[id];
      if(type==='missing'&&!s.have)items.push(id);
      if(type==='extras'&&s.extra>0)items.push(id+'×'+s.extra);
    }
    if(items.length)lines.push('['+name+'] '+items.join(', '));
  }));
  const title=type==='missing'?'❌ FIGURINHAS QUE FALTAM':'🔁 FIGURINHAS REPETIDAS';
  const text=title+'\nÁlbum Panini Copa 2026\n\n'+lines.join('\n');
  const show=msg=>{const el=document.getElementById('exportMsg');if(!el)return;el.textContent=msg;el.style.display='block';clearTimeout(exportTimer);exportTimer=setTimeout(()=>{el.style.display='none';},3000);};
  if(!lines.length){show(type==='missing'?'🎉 Nenhuma faltando!':'Nenhuma repetida.');return;}
  if(navigator.clipboard){navigator.clipboard.writeText(text).then(()=>show('✅ Copiado!')).catch(()=>show('✅ Copiado!'));}
  else{const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;top:0;left:-9999px';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');}catch(e){}document.body.removeChild(ta);show('✅ Copiado!');}
}

// INIT
state=loadState();
